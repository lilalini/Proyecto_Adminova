<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12">
  <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
    <h2 class="text-2xl font-bold text-center text-blue-600 mb-8">Crear cuenta</h2>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label for="first_name" class="block text-gray-700 text-sm font-bold mb-2">
            Nombre
          </label>
          <input
            id="first_name"
            type="text"
            [(ngModel)]="userData.first_name"
            name="first_name"
            required
            placeholder="María"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
          />
        </div>
        <div>
          <label for="last_name" class="block text-gray-700 text-sm font-bold mb-2">
            Apellido
          </label>
          <input
            id="last_name"
            type="text"
            [(ngModel)]="userData.last_name"
            name="last_name"
            required
            placeholder="García"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
          />
        </div>
      </div>

      <div class="mb-4">
        <label for="email" class="block text-gray-700 text-sm font-bold mb-2">
          Email
        </label>
        <input
          id="email"
          type="email"
          [(ngModel)]="userData.email"
          name="email"
          required
          placeholder="maria@ejemplo.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div class="mb-4">
        <label for="password" class="block text-gray-700 text-sm font-bold mb-2">
          Contraseña
        </label>
        <input
          id="password"
          type="password"
          [(ngModel)]="userData.password"
          name="password"
          required
          minlength="8"
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div class="mb-6">
        <label for="password_confirmation" class="block text-gray-700 text-sm font-bold mb-2">
          Confirmar contraseña
        </label>
        <input
          id="password_confirmation"
          type="password"
          [(ngModel)]="userData.password_confirmation"
          name="password_confirmation"
          required
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div *ngIf="errorMessage" class="mb-4 text-red-600 text-sm" role="alert">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 disabled:opacity-50"
      >
        {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
      </button>
    </form>

    <p class="mt-4 text-center text-gray-600">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-blue-600 hover:underline">Inicia sesión</a>
    </p>
  </div>
</div>
