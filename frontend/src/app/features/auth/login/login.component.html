<div class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
    <h2 class="text-2xl font-bold text-center text-blue-600 mb-8">ADMINOVA</h2>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="mb-4">
        <label for="email" class="block text-gray-700 text-sm font-bold mb-2">
          Email
        </label>
        <input
          id="email"
          type="email"
          [(ngModel)]="credentials.email"
          name="email"
          required
          placeholder="ejemplo@correo.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div class="mb-6">
        <label for="password" class="block text-gray-700 text-sm font-bold mb-2">
          Contraseña
        </label>
        <input
          id="password"
          type="password"
          [(ngModel)]="credentials.password"
          name="password"
          required
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
        />
      </div>

      <div *ngIf="errorMessage" class="mb-4 text-red-600 text-sm" role="alert">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 disabled:opacity-50"
      >
        {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="mt-4 text-center text-gray-600">
      ¿No tienes cuenta?
      <a routerLink="/register" class="text-blue-600 hover:underline">Regístrate</a>
    </p>
  </div>
</div>
