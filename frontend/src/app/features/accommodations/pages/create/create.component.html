<!-- create.component.html -->
<div class="max-w-2xl mx-auto p-6">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Crear nuevo alojamiento</h1>

  <form [formGroup]="accommodationForm" (ngSubmit)="onSubmit()" class="bg-white rounded-lg shadow-lg p-6">
    
    <!-- Título -->
    <div class="mb-4">
      <label for="title" class="block text-gray-700 text-sm font-bold mb-2">Nombre del alojamiento</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="Ej: Apartamento con vista al mar"
        title="Nombre del alojamiento"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
      />
    </div>

    <!-- Descripción -->
    <div class="mb-4">
      <label for="description" class="block text-gray-700 text-sm font-bold mb-2">Descripción</label>
      <textarea
        id="description"
        formControlName="description"
        rows="4"
        placeholder="Ej: Apartamento cómodo con 2 habitaciones y cocina equipada"
        title="Descripción del alojamiento"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
      ></textarea>
    </div>

    <!-- Dirección -->
    <div class="mb-4">
      <label for="address" class="block text-gray-700 text-sm font-bold mb-2">Dirección</label>
      <input
        id="address"
        type="text"
        formControlName="address"
        placeholder="Ej: Calle Mayor 123"
        title="Dirección del alojamiento"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
      />
    </div>

    <!-- Ciudad -->
    <div class="mb-4">
      <label for="city" class="block text-gray-700 text-sm font-bold mb-2">Ciudad</label>
      <input
        id="city"
        type="text"
        formControlName="city"
        placeholder="Ej: Barcelona"
        title="Ciudad del alojamiento"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
      />
    </div>

    <!-- País -->
    <div class="mb-4">
      <label for="country" class="block text-gray-700 text-sm font-bold mb-2">País</label>
      <input
        id="country"
        type="text"
        formControlName="country"
        placeholder="Ej: España"
        title="País del alojamiento"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
      />
    </div>

    <!-- Precio -->
    <div class="mb-4">
      <label for="base_price" class="block text-gray-700 text-sm font-bold mb-2">Precio por noche (€)</label>
      <input
        id="base_price"
        type="number"
        formControlName="base_price"
        placeholder="Ej: 80"
        title="Precio por noche"
        min="0"
        step="0.01"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
      />
    </div>

    <!-- Máx. huéspedes -->
    <div class="mb-4">
      <label for="max_guests" class="block text-gray-700 text-sm font-bold mb-2">Máximo de huéspedes</label>
      <input
        id="max_guests"
        type="number"
        formControlName="max_guests"
        placeholder="Ej: 4"
        title="Número máximo de huéspedes"
        min="1"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
      />
    </div>

    <!-- Property type -->
    <div class="mb-4">
      <label class="block text-gray-700 text-sm font-bold mb-2">Tipo de propiedad</label>
      <div formGroupName="property_type" class="flex space-x-4">
        <div *ngFor="let type of propertyTypes">
          <input type="checkbox" [formControlName]="type" id="{{type}}" />
          <label for="{{type}}" class="ml-1">{{type}}</label>
        </div>
      </div>
    </div>

    <!-- Amenities dinámicos -->
    <div class="mb-4">
      <label class="block text-gray-700 text-sm font-bold mb-2">Servicios / Amenities</label>
      <div *ngFor="let amenityCtrl of amenitiesControls; let i = index" class="flex items-center mb-2">
        <input
          [formControl]="amenityCtrl"
          placeholder="Ej: WiFi, Parking, Piscina"
          title="Amenity"
          class="w-full px-3 py-2 border border-gray-300 rounded-l-lg"
        />
        <button type="button" (click)="removeAmenity(i)" class="bg-red-500 text-white px-3 py-2 rounded-r-lg">X</button>
      </div>
      <button type="button" (click)="addAmenity()" class="bg-green-500 text-white px-4 py-2 rounded-lg mt-2">+ Añadir Amenity</button>
    </div>

    <!-- House rules dinámicos -->
    <div class="mb-4">
      <label class="block text-gray-700 text-sm font-bold mb-2">Normas de la casa</label>
      <div *ngFor="let ruleCtrl of rulesControls; let i = index" class="flex items-center mb-2">
        <input
          [formControl]="ruleCtrl"
          placeholder="Ej: No fumar, No mascotas, No fiestas"
          title="House rule"
          class="w-full px-3 py-2 border border-gray-300 rounded-l-lg"
        />
        <button type="button" (click)="removeRule(i)" class="bg-red-500 text-white px-3 py-2 rounded-r-lg">X</button>
      </div>
      <button type="button" (click)="addRule()" class="bg-green-500 text-white px-4 py-2 rounded-lg mt-2">+ Añadir norma</button>
    </div>

    <!-- Errores -->
    <div *ngIf="errorMessage" class="mb-4 text-red-600 text-sm" role="alert">{{ errorMessage }}</div>

    <!-- Botones -->
    <div class="flex space-x-4 mt-4">
      <button type="submit" [disabled]="loading" class="bg-blue-600 text-white px-4 py-2 rounded-lg">
        {{ loading ? 'Creando...' : 'Crear alojamiento' }}
      </button>
      <button type="button" (click)="router.navigate(['/dashboard'])" class="bg-gray-400 text-white px-4 py-2 rounded-lg">
        Cancelar
      </button>
    </div>
  </form>
</div>
