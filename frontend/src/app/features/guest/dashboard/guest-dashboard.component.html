<div class="max-w-7xl mx-auto px-4 pb-8">
  <!-- Saludo reutilizable -->
  <app-greeting [user]="user"></app-greeting>

    <div class="bg-white rounded-xl p-4 mt-6">
    <h1 class="text-2xl font-semibold text-gray-800 mb-1">Mi área personal</h1>
    <p class="text-gray-500">Gestiona tus reservas, puntos y preferencias</p>
    </div>
    <div class="mt-6">
    <!-- Tarjetas de resumen -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <!-- Reservas - CAMBIA A /my-bookings -->
      <a routerLink="/my-bookings" class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-indigo-100 rounded-lg flex items-center justify-center">
            <app-icon-svg name="calendar-check" className="w-6 h-6 text-indigo-600"></app-icon-svg>
          </div>
          <div>
            <p class="text-2xl font-bold text-gray-800">{{ stats.upcomingBookings }}</p>
            <p class="text-sm text-gray-500">Próximas reservas</p>
          </div>
        </div>
      </a>

      <!-- Puntos -->
      <a routerLink="/guest/points" class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center">
            <app-icon-svg name="star" className="w-6 h-6 text-amber-600"></app-icon-svg>
          </div>
          <div>
            <p class="text-2xl font-bold text-gray-800">{{ stats.pointsBalance }}</p>
            <p class="text-sm text-gray-500">Puntos disponibles</p>
          </div>
        </div>
      </a>

      <!-- Reseñas pendientes -->
      <a routerLink="/guest/reviews" class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
            <app-icon-svg name="message-circle" className="w-6 h-6 text-green-600"></app-icon-svg>
          </div>
          <div>
            <p class="text-2xl font-bold text-gray-800">{{ stats.pendingReviews }}</p>
            <p class="text-sm text-gray-500">Reseñas pendientes</p>
          </div>
        </div>
      </a>

      <!-- Notificaciones -->
      <a routerLink="/guest/notifications" class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
            <app-icon-svg name="bell" className="w-6 h-6 text-purple-600"></app-icon-svg>
          </div>
          <div>
            <p class="text-2xl font-bold text-gray-800">{{ stats.unreadNotifications }}</p>
            <p class="text-sm text-gray-500">Notificaciones</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Acceso rápido a secciones -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Mis reservas - CAMBIA A /my-bookings -->
      <a routerLink="/my-bookings" class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition border-l-4 border-indigo-500">
        <div class="flex items-center gap-4">
          <app-icon-svg name="calendar" className="w-5 h-5 text-indigo-600"></app-icon-svg>
          <span class="font-medium">Mis reservas</span>
          <app-icon-svg name="chevron-right" className="w-5 h-5 text-gray-400 ml-auto"></app-icon-svg>
        </div>
      </a>

      <!-- Mi perfil -->
      <a routerLink="/guest/profile" class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition border-l-4 border-emerald-500">
        <div class="flex items-center gap-4">
          <app-icon-svg name="user" className="w-5 h-5 text-emerald-600"></app-icon-svg>
          <span class="font-medium">Mi perfil</span>
          <app-icon-svg name="chevron-right" className="w-5 h-5 text-gray-400 ml-auto"></app-icon-svg>
        </div>
      </a>

      <!-- Mis documentos -->
      <a routerLink="/guest/documents" class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition border-l-4 border-amber-500">
        <div class="flex items-center gap-4">
          <app-icon-svg name="file-text" className="w-5 h-5 text-amber-600"></app-icon-svg>
          <span class="font-medium">Mis documentos</span>
          <app-icon-svg name="chevron-right" className="w-5 h-5 text-gray-400 ml-auto"></app-icon-svg>
        </div>
      </a>
    </div>
  </div>
</div>
