<div class="max-w-2xl mx-auto px-4 py-8">
  <div class="flex items-center gap-3 mb-6">
    <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
      <app-icon-svg name="user-plus" className="w-6 h-6 text-green-600"></app-icon-svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">Nuevo huésped</h1>
  </div>

  @if (errorMessage) {
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
      {{ errorMessage }}
    </div>
  }

  @if (successMessage) {
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4">
      {{ successMessage }}
    </div>
  }

  <form (ngSubmit)="onSubmit()" class="bg-white rounded-xl shadow-lg p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
        <input type="text" [(ngModel)]="guest.first_name" name="first_name" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg"
               title="Nombre del huésped"
               placeholder="Nombre">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos *</label>
        <input type="text" [(ngModel)]="guest.last_name" name="last_name" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg"
               title="Apellidos del huésped"
               placeholder="Apellidos">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
      <input type="email" [(ngModel)]="guest.email" name="email" required
             class="w-full px-3 py-2 border border-gray-300 rounded-lg"
             title="Correo electrónico"
             placeholder="correo@ejemplo.com">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
      <input type="tel" [(ngModel)]="guest.phone" name="phone"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg"
             title="Teléfono de contacto"
             placeholder="Teléfono">
    </div>

    <div class="flex justify-end gap-3 pt-4">
      <a routerLink="/admin/dashboard" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
        Cancelar
      </a>
      <button type="submit" [disabled]="saving" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
        {{ saving ? 'Guardando...' : 'Crear huésped' }}
      </button>
    </div>
  </form>
</div>
