<div class="max-w-2xl mx-auto px-4 py-8">
  <!-- Cabecera -->
  <div class="flex items-center gap-3 mb-6">
    <div class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center">
      <app-icon-svg name="user" className="w-6 h-6 text-indigo-600"></app-icon-svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">Mi perfil</h1>
  </div>

  @if (loading) {
    <div class="text-center py-12">
      <p class="text-gray-500">Cargando...</p>
    </div>
  }

  @if (!loading) {
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
      <form (ngSubmit)="onSubmit()" #profileForm="ngForm">
        <div class="p-6 space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="first_name" class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
              <input
                id="first_name"
                type="text"
                [(ngModel)]="profile.first_name"
                name="first_name"
                required
                placeholder="Tu nombre"
                title="Nombre del usuario"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-300"
              />
            </div>
            <div>
              <label for="last_name" class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
              <input
                id="last_name"
                type="text"
                [(ngModel)]="profile.last_name"
                name="last_name"
                required
                placeholder="Tu apellido"
                title="Apellido del usuario"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-300"
              />
            </div>
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input
              id="email"
              type="email"
              [(ngModel)]="profile.email"
              name="email"
              readonly
              placeholder="correo@ejemplo.com"
              title="Correo electrónico (no modificable)"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50"
            />
            <p class="text-xs text-gray-400 mt-1">El email no se puede cambiar</p>
          </div>

          <div>
            <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
            <input
              id="phone"
              type="tel"
              [(ngModel)]="profile.phone"
              name="phone"
              placeholder="Ej: 600123456"
              title="Teléfono de contacto"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-300"
            />
          </div>
        </div>

        <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
          @if (successMessage) {
            <div class="mb-3 text-green-600 text-sm">{{ successMessage }}</div>
          }
          @if (errorMessage) {
            <div class="mb-3 text-red-600 text-sm">{{ errorMessage }}</div>
          }
          <div class="flex justify-end gap-3">
            <button
              type="submit"
              [disabled]="saving || !profileForm.valid"
              class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50"
            >
              {{ saving ? 'Guardando...' : 'Guardar cambios' }}
            </button>
          </div>
        </div>
      </form>
    </div>
  }
</div>
