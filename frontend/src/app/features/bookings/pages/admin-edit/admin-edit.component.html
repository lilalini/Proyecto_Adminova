<div class="max-w-2xl mx-auto px-4 py-8">
  <div class="flex items-center gap-3 mb-6">
    <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
      <app-icon-svg name="edit" className="w-6 h-6 text-amber-600"></app-icon-svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">Modificar reserva</h1>
  </div>

  @if (loading) {
    <div class="text-center py-12">
      <p class="text-gray-500">Cargando...</p>
    </div>
  }

  @if (errorMessage) {
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
      {{ errorMessage }}
    </div>
  }

  @if (successMessage) {
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4">
      {{ successMessage }}
    </div>
  }

  @if (booking && !loading) {
    <form (ngSubmit)="onSubmit()" class="bg-white rounded-xl shadow-lg p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Referencia</label>
        <input type="text" [value]="booking.booking_reference" disabled 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50"
               placeholder="Referencia de la reserva"
               title="Referencia de la reserva (no editable)">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Cliente</label>
        <input type="text" [value]="booking.guest_name" disabled 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50"
               placeholder="Nombre del cliente"
               title="Nombre del cliente (no editable)">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Check-in</label>
          <input type="date" [(ngModel)]="booking.check_in" name="check_in" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 title="Fecha de entrada">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Check-out</label>
          <input type="date" [(ngModel)]="booking.check_out" name="check_out" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 title="Fecha de salida">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Adultos</label>
          <input type="number" [(ngModel)]="booking.adults" name="adults" min="1" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 placeholder="Número de adultos"
                 title="Número de adultos">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Niños</label>
          <input type="number" [(ngModel)]="booking.children" name="children" min="0" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 placeholder="Número de niños"
                 title="Número de niños">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
        <select [(ngModel)]="booking.status" name="status" 
                class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                title="Estado de la reserva">
          <option value="pending">Pendiente</option>
          <option value="confirmed">Confirmada</option>
          <option value="cancelled">Cancelada</option>
          <option value="checked_in">Check-in</option>
          <option value="checked_out">Check-out</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Total (€)</label>
        <input type="number" step="0.01" [(ngModel)]="booking.total_amount" name="total_amount" 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg"
               placeholder="Precio total"
               title="Precio total de la reserva">
      </div>

      <div class="flex justify-end gap-3 pt-4">
        <a routerLink="/admin/bookings" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
          Cancelar
        </a>
        <button type="submit" [disabled]="saving" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
          {{ saving ? 'Guardando...' : 'Guardar cambios' }}
        </button>
      </div>
    </form>
  }
</div>
