<div class="max-w-2xl mx-auto px-4 py-8">
  <div class="flex items-center gap-3 mb-6">
    <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
      <app-icon-svg name="plus" className="w-6 h-6 text-green-600"></app-icon-svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">Nueva reserva</h1>
  </div>

  @if (loading) {
    <div class="text-center py-12">
      <p class="text-gray-500">Cargando datos...</p>
    </div>
  }

  @if (errorMessage) {
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
      {{ errorMessage }}
    </div>
  }

  @if (successMessage) {
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4">
      {{ successMessage }}
    </div>
  }

  @if (!loading) {
    <form (ngSubmit)="onSubmit()" class="bg-white rounded-xl shadow-lg p-6 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Alojamiento *</label>
          <select [(ngModel)]="bookingData.accommodation_id" name="accommodation_id" required
                  (change)="onAccommodationChange()"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                  title="Selecciona el alojamiento"
                  placeholder="Selecciona un alojamiento">
            <option value="">Seleccionar...</option>
            @for (acc of accommodations; track acc.id) {
              <option [value]="acc.id">{{ acc.title }} - €{{ acc.base_price }}/noche</option>
            }
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Huésped *</label>
          <select [(ngModel)]="bookingData.guest_id" name="guest_id" required
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                  title="Selecciona el huésped"
                  placeholder="Selecciona un huésped">
            <option value="">Seleccionar...</option>
            @for (guest of guests; track guest.id) {
              <option [value]="guest.id">{{ guest.first_name }} {{ guest.last_name }} - {{ guest.email }}</option>
            }
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Check-in *</label>
          <input type="date" [(ngModel)]="bookingData.check_in" name="check_in" required
                 (change)="calculateNights()"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 title="Fecha de entrada"
                 placeholder="dd/mm/aaaa">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Check-out *</label>
          <input type="date" [(ngModel)]="bookingData.check_out" name="check_out" required
                 (change)="calculateNights()"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 title="Fecha de salida"
                 placeholder="dd/mm/aaaa">
        </div>
      </div>

      <div class="grid grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Noches</label>
          <input type="number" [(ngModel)]="bookingData.nights" name="nights" readonly
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50"
                 title="Número de noches (calculado automáticamente)"
                 placeholder="Noches">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Adultos</label>
          <input type="number" [(ngModel)]="bookingData.adults" name="adults" min="1"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 title="Número de adultos"
                 placeholder="Adultos">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Niños</label>
          <input type="number" [(ngModel)]="bookingData.children" name="children" min="0"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 title="Número de niños"
                 placeholder="Niños">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Total (€)</label>
          <input type="number" step="0.01" [(ngModel)]="bookingData.total_amount" name="total_amount"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                 title="Precio total de la reserva"
                 placeholder="Total">
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-4">
        <a routerLink="/admin/dashboard" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
           title="Cancelar creación">
          Cancelar
        </a>
        <button type="submit" [disabled]="saving" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50"
                title="Crear nueva reserva">
          {{ saving ? 'Guardando...' : 'Crear reserva' }}
        </button>
      </div>
    </form>
  }
</div>
