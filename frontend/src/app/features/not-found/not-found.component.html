<div class="min-h-screen bg-gradient-to-b from-gray-50 to-gray-100 flex items-center justify-center px-4">
  <div class="text-center max-w-2xl">
    <!-- Número 404 con animación -->
    <div class="relative mb-8">
      <div class="text-9xl md:text-9xl font-bold text-indigo-600 opacity-10">404</div>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="relative">
          <div class="w-32 h-32 bg-indigo-100 rounded-full flex items-center justify-center animate-pulse">
            <app-icon-svg name="compass" className="w-16 h-16 text-indigo-600"></app-icon-svg>
          </div>
        </div>
      </div>
    </div>

    <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
      ¡Ups! Página no encontrada
    </h1>
    <p class="text-lg text-gray-600 mb-8">
      La página que estás buscando no existe o ha sido movida.
      <br>
      Te ayudamos a encontrar el camino de vuelta.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
      <a routerLink="/" 
         class="inline-flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-xl transition transform hover:scale-105">
        <app-icon-svg name="home" className="w-5 h-5"></app-icon-svg>
        Ir al inicio
      </a>
      <button (click)="goBack()" 
              class="inline-flex items-center justify-center gap-2 bg-white hover:bg-gray-50 text-gray-700 font-semibold px-6 py-3 rounded-xl border border-gray-300 transition">
        <app-icon-svg name="arrow-left" className="w-5 h-5"></app-icon-svg>
        Volver atrás
      </button>
    </div>

    <div class="border-t border-gray-200 pt-8">
      <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">
        También puedes visitar
      </h3>
      <div class="flex flex-wrap justify-center gap-4">
        <a routerLink="/accommodations" class="text-gray-600 hover:text-indigo-600 transition">Alojamientos</a>
        <span class="text-gray-300">•</span>
        <a routerLink="/my-bookings" class="text-gray-600 hover:text-indigo-600 transition">Mis reservas</a>
        <span class="text-gray-300">•</span>
        <a routerLink="/guest/profile" class="text-gray-600 hover:text-indigo-600 transition">Mi perfil</a>
      </div>
    </div>

    <div class="mt-12 text-sm text-gray-400">
      <p>ADMINOVA - Gestión profesional de alojamientos</p>
    </div>
  </div>
</div>
