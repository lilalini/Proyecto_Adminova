<div class="animate-pulse">

@switch (type) {

  @case ('stat') {
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <div class="flex items-center justify-between">
        <div>
          <div class="bg-gray-200 h-4 w-20 rounded"></div>
          <div class="bg-gray-200 h-8 w-16 rounded mt-2"></div>
        </div>
        <div class="bg-gray-200 w-12 h-12 rounded-lg"></div>
      </div>
      <div class="mt-4">
        <div class="bg-gray-200 h-3 w-24 rounded"></div>
      </div>
    </div>
  }

  @case ('card') {
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <div class="flex items-center gap-4">
        <div class="bg-gray-200 w-12 h-12 rounded-lg"></div>
        <div class="flex-1">
          <div class="bg-gray-200 h-5 w-32 rounded"></div>
          <div class="bg-gray-200 h-4 w-48 rounded mt-2"></div>
        </div>
      </div>
    </div>
  }

  @case ('list-item') {
    <div class="flex items-center justify-between py-3">
      <div class="flex items-center gap-4">
        <div class="bg-gray-200 w-10 h-10 rounded-lg"></div>
        <div>
          <div class="bg-gray-200 h-5 w-48 rounded"></div>
          <div class="bg-gray-200 h-4 w-32 rounded mt-1"></div>
        </div>
      </div>
      <div class="bg-gray-200 h-5 w-16 rounded"></div>
    </div>
  }

  @case ('button') {
    <div class="bg-gray-200 rounded-xl h-28"></div>
  }

  @default {
    <div
      class="bg-gray-200 rounded"
      [style.width]="width"
      [style.height]="height"
      [ngClass]="className">
    </div>
  }

}

</div>
